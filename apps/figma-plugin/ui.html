<!DOCTYPE html>
<html>
<head>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 12px; color: #333; padding: 16px; background: #fff; }
    h2 { font-size: 14px; font-weight: 600; margin-bottom: 16px; color: #1a1a1a; }
    .header { display: flex; align-items: center; gap: 10px; margin-bottom: 16px; }
    .header h2 { margin-bottom: 0; }
    .logo { width: 28px; height: 28px; flex-shrink: 0; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 500; margin-bottom: 6px; color: #555; }
    input, select { width: 100%; padding: 10px 12px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; transition: border-color 0.2s; }
    input:focus, select:focus { outline: none; border-color: #667eea; }
    .button-group { display: flex; gap: 8px; margin-top: 20px; }
    button { flex: 1; padding: 10px 16px; border: none; border-radius: 6px; font-size: 12px; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
    .btn-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4); }
    .btn-secondary { background: #f3f4f6; color: #374151; }
    .btn-secondary:hover:not(:disabled) { background: #e5e7eb; }
    .help-text { font-size: 10px; color: #9ca3af; margin-top: 4px; }
    .status { margin-top: 12px; padding: 8px 12px; border-radius: 6px; font-size: 11px; display: none; }
    .status.info { display: block; background: #dbeafe; color: #1e40af; }
    .status.success { display: block; background: #d1fae5; color: #059669; }
    .status.error { display: block; background: #fee2e2; color: #dc2626; }
    .task-preview { margin-top: 16px; }
    .task-preview h4 { font-size: 12px; font-weight: 600; margin-bottom: 8px; color: #374151; }
    .task-preview ul { list-style: none; max-height: 160px; overflow-y: auto; border: 1px solid #e5e7eb; border-radius: 6px; padding: 8px; }
    .task-preview li { padding: 4px 0; border-bottom: 1px solid #f3f4f6; font-size: 11px; }
    .task-preview li:last-child { border-bottom: none; }
    hr { border: none; border-top: 1px solid #e5e7eb; margin: 16px 0; }
    .board-info { font-size: 10px; color: #6b7280; margin-top: 4px; padding: 6px 8px; background: #f9fafb; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="header">
    <svg class="logo" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
      <defs><linearGradient id="ftv-gradient" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#667eea"/><stop offset="100%" style="stop-color:#764ba2"/></linearGradient></defs>
      <rect width="100" height="100" rx="20" fill="url(#ftv-gradient)"/>
      <text x="50" y="68" font-family="Arial Black, sans-serif" font-size="48" font-weight="900" fill="white" text-anchor="middle">ftv</text>
    </svg>
    <h2>Boilerplate - Delivery Export</h2>
  </div>

  <div class="form-group">
    <label for="apiUrl">URL du serveur</label>
    <input type="text" id="apiUrl" placeholder="http://localhost:5170" value="http://localhost:5170">
    <div class="help-text">Dev: http://localhost:5170 | Prod: https://studio.vitess.tech</div>
  </div>

  <div class="form-group">
    <label for="boardSelect">Board</label>
    <select id="boardSelect" disabled>
      <option value="">-- Charger les boards --</option>
    </select>
    <div class="board-info" id="boardInfo" style="display: none;"></div>
    <div class="help-text" style="margin-top: 6px;">
      <button class="btn-secondary" id="refreshBoardsBtn" onclick="loadBoards()" style="flex: none; padding: 4px 10px; font-size: 10px;">Charger les boards</button>
    </div>
  </div>

  <hr>
  <h3 style="font-size: 12px; margin-bottom: 12px; color: #6b7280;">Configuration du positionnement</h3>

  <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
    <div class="form-group" style="margin-bottom: 8px;">
      <label for="startX">Position X</label>
      <input type="number" id="startX" value="200">
    </div>
    <div class="form-group" style="margin-bottom: 8px;">
      <label for="startY">Position Y</label>
      <input type="number" id="startY" value="300">
    </div>
    <div class="form-group" style="margin-bottom: 8px;">
      <label for="columnWidth">Largeur colonne</label>
      <input type="number" id="columnWidth" value="560">
    </div>
    <div class="form-group" style="margin-bottom: 8px;">
      <label for="rowHeight">Hauteur ligne</label>
      <input type="number" id="rowHeight" value="200">
    </div>
  </div>
  <div class="help-text" style="margin-bottom: 16px;">Ajustez ces valeurs selon votre grille FigJam</div>

  <div class="button-group">
    <button class="btn-primary" id="loadBtn" onclick="loadTasks()" disabled>Charger les taches</button>
    <button class="btn-secondary" onclick="cancel()">Annuler</button>
  </div>

  <div class="status" id="status"></div>

  <div class="task-preview" id="taskPreview" style="display: none;">
    <h4>Taches chargees (<span id="taskCount">0</span>)</h4>
    <ul id="taskList"></ul>
  </div>

  <div id="importSection" style="display: none;">
    <hr>
    <div class="button-group">
      <button class="btn-primary" id="importTasksBtn" onclick="importTasks()">Importer dans Figma</button>
    </div>
  </div>

  <script>
    var loadedData = null;
    var boardsCache = [];
    var apiBaseUrl = '';

    function setStatus(message, type) {
      type = type || 'info';
      var status = document.getElementById('status');
      status.className = 'status ' + type;
      status.textContent = message;
    }

    function getApiBase() {
      var url = document.getElementById('apiUrl').value.trim().replace(/\/+$/, '');
      apiBaseUrl = url;
      // Vite proxy: /delivery-api → backend /delivery/api
      return apiBaseUrl + '/delivery-api';
    }

    async function loadBoards() {
      var base = getApiBase();
      setStatus('Chargement des boards...', 'info');
      document.getElementById('refreshBoardsBtn').disabled = true;

      try {
        var response = await fetch(base + '/figma/boards', {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
        });

        if (!response.ok) throw new Error('HTTP ' + response.status + ': ' + response.statusText);

        boardsCache = await response.json();

        var select = document.getElementById('boardSelect');
        select.innerHTML = '<option value="">-- Selectionnez un board --</option>';

        for (var i = 0; i < boardsCache.length; i++) {
          var b = boardsCache[i];
          var label = b.name + ' (' + (b.boardType || 'agile') + ')';
          var opt = document.createElement('option');
          opt.value = b.id;
          opt.textContent = label;
          select.appendChild(opt);
        }

        select.disabled = false;
        document.getElementById('loadBtn').disabled = false;
        setStatus(boardsCache.length + ' boards disponibles', 'success');
      } catch (error) {
        setStatus('Erreur: ' + error.message, 'error');
      } finally {
        document.getElementById('refreshBoardsBtn').disabled = false;
      }
    }

    document.getElementById('boardSelect').addEventListener('change', function() {
      var boardId = this.value;
      var info = document.getElementById('boardInfo');
      if (!boardId) { info.style.display = 'none'; return; }

      var board = boardsCache.find(function(b) { return b.id === boardId; });
      if (!board) { info.style.display = 'none'; return; }

      var type = board.boardType === 'calendaire' ? 'Calendaire' : 'Agile';
      var cols = board.boardType === 'calendaire' ? 4 : (board.durationWeeks || 6);
      info.textContent = type + ' | ' + (board.startDate || '?') + ' → ' + (board.endDate || '?') + ' | ' + cols + ' colonnes';
      info.style.display = 'block';
    });

    async function loadTasks() {
      var boardId = document.getElementById('boardSelect').value;
      if (!boardId) { setStatus('Veuillez selectionner un board', 'error'); return; }

      var base = getApiBase();
      setStatus('Chargement des taches...', 'info');
      document.getElementById('loadBtn').disabled = true;

      try {
        var response = await fetch(base + '/figma/boards/' + boardId + '/export', {
          method: 'GET',
          headers: { 'Accept': 'application/json' },
        });

        if (!response.ok) throw new Error('HTTP ' + response.status + ': ' + (await response.text()));

        loadedData = await response.json();

        if (!loadedData.tasks || loadedData.tasks.length === 0) {
          setStatus('Aucune tache trouvee dans ce board', 'error');
          document.getElementById('taskPreview').style.display = 'none';
          document.getElementById('importSection').style.display = 'none';
          return;
        }

        document.getElementById('taskCount').textContent = loadedData.count;
        var taskList = document.getElementById('taskList');
        var html = '';
        var showCount = Math.min(8, loadedData.tasks.length);
        for (var i = 0; i < showCount; i++) {
          var t = loadedData.tasks[i];
          var title = t.title.length > 40 ? t.title.substring(0, 40) + '...' : t.title;
          html += '<li><strong>' + t.jiraKey + '</strong> - ' + title + '</li>';
        }
        if (loadedData.tasks.length > showCount) {
          html += '<li style="color: #9ca3af;">... et ' + (loadedData.tasks.length - showCount) + ' autres</li>';
        }
        taskList.innerHTML = html;

        document.getElementById('taskPreview').style.display = 'block';
        document.getElementById('importSection').style.display = 'block';
        setStatus(loadedData.count + ' taches chargees (' + loadedData.boardName + ', ' + loadedData.totalCols + ' colonnes)', 'success');
      } catch (error) {
        setStatus('Erreur: ' + error.message, 'error');
        document.getElementById('taskPreview').style.display = 'none';
        document.getElementById('importSection').style.display = 'none';
      } finally {
        document.getElementById('loadBtn').disabled = false;
      }
    }

    function importTasks() {
      if (!loadedData || !loadedData.tasks || loadedData.tasks.length === 0) {
        setStatus('Aucune tache a importer', 'error');
        return;
      }

      parent.postMessage({
        pluginMessage: {
          type: 'import-tasks',
          boardName: loadedData.boardName,
          totalCols: loadedData.totalCols,
          tasks: loadedData.tasks,
          config: {
            startX: parseInt(document.getElementById('startX').value) || 200,
            startY: parseInt(document.getElementById('startY').value) || 300,
            columnWidth: parseInt(document.getElementById('columnWidth').value) || 560,
            rowHeight: parseInt(document.getElementById('rowHeight').value) || 200,
          },
        }
      }, '*');
    }

    function cancel() {
      parent.postMessage({ pluginMessage: { type: 'cancel' } }, '*');
    }

    // Auto-load boards on startup
    loadBoards();
  </script>
</body>
</html>
